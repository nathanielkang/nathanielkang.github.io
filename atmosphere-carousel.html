<!-- Shared hero carousel — include inside prospect-hero on members.html and prospective.html -->
<div class="wrap atmosphere-carousel-wrap">
  <div class="atmosphere-carousel" role="region" aria-roledescription="carousel" aria-label="Mathematics and statistics">
    <div class="atmosphere-carousel__viewport">
      <figure class="atmosphere-carousel__slide is-active">
        <img src="img/atmosphere/socal-atmosphere-svd.png" width="1920" height="1080" decoding="async" alt="Singular value decomposition: A equals U Sigma V transpose, on a concrete university corridor at golden hour.">
      </figure>
      <figure class="atmosphere-carousel__slide">
        <img src="img/atmosphere/socal-atmosphere-chebyshev.png" width="1920" height="1080" decoding="async" alt="Chebyshev inequality: probability that X deviates from the mean by at least k standard deviations is at most one over k squared, on a snow-covered campus path.">
      </figure>
      <figure class="atmosphere-carousel__slide">
        <img src="img/atmosphere/socal-atmosphere-clt.png" width="1920" height="1080" decoding="async" alt="Central limit theorem: standardized sample mean converges to a standard normal distribution, over a dusk campus skyline.">
      </figure>
      <figure class="atmosphere-carousel__slide">
        <img src="img/atmosphere/socal-atmosphere-cauchy-schwarz.png" width="1920" height="1080" decoding="async" alt="Cauchy–Schwarz inequality: absolute inner product at most product of norms, inside a spiral concrete atrium.">
      </figure>
      <figure class="atmosphere-carousel__slide">
        <img src="img/atmosphere/socal-atmosphere-spectral.png" width="1920" height="1080" decoding="async" alt="Eigenvalue equation Av equals lambda v and spectral theorem for symmetric matrices, in a glass atrium with rainbow light.">
      </figure>
      <figure class="atmosphere-carousel__slide">
        <img src="img/atmosphere/socal-atmosphere-bayes.png" width="1920" height="1080" decoding="async" alt="Bayes theorem: posterior probability equals likelihood times prior divided by evidence, on rain-streaked glass at night.">
      </figure>
    </div>
    <div class="atmosphere-carousel__dots" role="tablist" aria-label="Choose slide"></div>
  </div>
</div>
